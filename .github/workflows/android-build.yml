name: Android Build

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java for Android SDK tools
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-31" "build-tools;30.0.3"

      - name: Set up Java for Gradle build
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Build and lint
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon lintDebug assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: open-desk-calendar-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  release:
    name: Build signed release APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java for Android SDK tools
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-31" "build-tools;30.0.3"

      - name: Set up Java for Gradle build
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore
        env:
          OPEN_DESK_CALENDAR_RELEASE_KEYSTORE_BASE64: ${{ secrets.OPEN_DESK_CALENDAR_RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [[ -z "$OPEN_DESK_CALENDAR_RELEASE_KEYSTORE_BASE64" ]]; then
            echo "Missing GitHub secret: OPEN_DESK_CALENDAR_RELEASE_KEYSTORE_BASE64" >&2
            exit 1
          fi
          printf '%s' "$OPEN_DESK_CALENDAR_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/opendeskcalendar-release.jks"

      - name: Build signed release APK
        env:
          OPEN_DESK_CALENDAR_STORE_FILE: ${{ runner.temp }}/opendeskcalendar-release.jks
          OPEN_DESK_CALENDAR_STORE_PASSWORD: ${{ secrets.OPEN_DESK_CALENDAR_STORE_PASSWORD }}
          OPEN_DESK_CALENDAR_KEY_ALIAS: ${{ secrets.OPEN_DESK_CALENDAR_KEY_ALIAS }}
          OPEN_DESK_CALENDAR_KEY_PASSWORD: ${{ secrets.OPEN_DESK_CALENDAR_KEY_PASSWORD }}
        run: |
          for name in OPEN_DESK_CALENDAR_STORE_PASSWORD OPEN_DESK_CALENDAR_KEY_ALIAS OPEN_DESK_CALENDAR_KEY_PASSWORD; do
            if [[ -z "${!name}" ]]; then
              echo "Missing GitHub secret: $name" >&2
              exit 1
            fi
          done
          chmod +x ./gradlew ./scripts/build-release.sh
          ./scripts/build-release.sh

      - name: Upload signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: open-desk-calendar-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          apk="app/build/outputs/apk/release/app-release.apk"
          asset="OpenDeskCalendar-${TAG_NAME}.apk"
          cp "$apk" "$asset"

          prerelease_args=()
          if [[ "$TAG_NAME" == *alpha* || "$TAG_NAME" == *beta* || "$TAG_NAME" == *rc* ]]; then
            prerelease_args+=(--prerelease)
          fi

          notes="$(cat <<EOF
          Signed Android release APK.

          Build: ${GITHUB_SHA}
          Tag: ${TAG_NAME}
          EOF
          )"
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" --title "$TAG_NAME" "${prerelease_args[@]}"
          else
            gh release create "$TAG_NAME" --title "$TAG_NAME" --notes "$notes" "${prerelease_args[@]}"
          fi
          gh release upload "$TAG_NAME" "$asset" --clobber
